services:
  postgres:
    image: postgres:16-alpine
    container_name: causal-eventstore-postgres
    environment:
      POSTGRES_USER: eventstore
      POSTGRES_PASSWORD: eventstore123
      POSTGRES_DB: event_store
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventstore -d event_store"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - causal-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: causal-eventstore-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_store
      SPRING_DATASOURCE_USERNAME: eventstore
      SPRING_DATASOURCE_PASSWORD: eventstore123
      NODE_ID: leader-1
      NODE_ROLE: LEADER
      LEADER_ADDRESS: backend:9090
      TZ: Asia/Shanghai
      JAVA_OPTS: -Xmx1g -Xms512m
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - causal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/cluster/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  backend-follower-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: causal-eventstore-follower-1
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_store
      SPRING_DATASOURCE_USERNAME: eventstore
      SPRING_DATASOURCE_PASSWORD: eventstore123
      NODE_ID: follower-1
      NODE_ROLE: FOLLOWER
      LEADER_ADDRESS: backend:9090
      TZ: Asia/Shanghai
      SERVER_PORT: 8081
      GRPC_SERVER_PORT: 9091
      JAVA_OPTS: -Xmx512m -Xms256m
    networks:
      - causal-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: causal-eventstore-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - causal-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  causal-net:
    driver: bridge
