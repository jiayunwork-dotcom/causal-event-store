server:
  port: 8080

spring:
  application:
    name: causal-event-store
  datasource:
    url: jdbc:postgresql://postgres:5432/event_store
    username: eventstore
    password: eventstore123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 100
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

grpc:
  server:
    port: 9090

app:
  partitions: 8
  snapshot:
    threshold: 100
    retention: 3
  batch:
    max-size: 100
  replication:
    role: ${NODE_ROLE:LEADER}
    node-id: ${NODE_ID:node-1}
    leader-address: ${LEADER_ADDRESS:localhost:9090}
