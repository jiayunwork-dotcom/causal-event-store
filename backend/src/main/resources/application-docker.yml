server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: causal-event-store
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/event_store}
    username: ${SPRING_DATASOURCE_USERNAME:eventstore}
    password: ${SPRING_DATASOURCE_PASSWORD:eventstore123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}

app:
  partitions: 8
  snapshot:
    threshold: 100
    retention: 3
  batch:
    max-size: 100
  replication:
    role: ${NODE_ROLE:LEADER}
    node-id: ${NODE_ID:node-1}
    leader-address: ${LEADER_ADDRESS:localhost:9090}

logging:
  level:
    root: INFO
    com.causal.eventstore: INFO
    org.hibernate.SQL: WARN
    io.grpc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
